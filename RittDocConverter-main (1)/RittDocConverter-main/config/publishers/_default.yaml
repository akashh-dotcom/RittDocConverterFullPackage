# Default Publisher Configuration
# ================================
# This configuration provides common CSS class and epub:type mappings
# that work across most EPUB publishers. Publisher-specific configs
# can override these defaults.
#
# To create a publisher-specific config:
# 1. Copy this file to {publisher_name}.yaml
# 2. Modify the patterns as needed
# 3. The loader will merge publisher config with defaults

publisher_name: "Default"
publisher_patterns: []  # Matches all publishers not explicitly configured

# ============================================================================
# CSS CLASS TO DOCBOOK ELEMENT MAPPINGS
# ============================================================================
# Maps CSS class names to DocBook elements and optional roles.
# Case-insensitive matching. Patterns support wildcards (* and ?).

css_class_mappings:
  # --- STRUCTURAL ELEMENTS ---
  # Chapters and sections
  chapter:
    element: chapter
  section:
    element: sect1
  subsection:
    element: sect2
  subsubsection:
    element: sect3

  # Parts and divisions
  part:
    element: part
  division:
    element: part
  unit:
    element: part

  # --- TITLE PATTERNS ---
  # Various title class patterns
  chaptertitle:
    element: title
    role: chapter-title
  chapter-title:
    element: title
    role: chapter-title
  chaptitle:
    element: title
    role: chapter-title
  sectiontitle:
    element: title
    role: section-title
  section-title:
    element: title
    role: section-title
  sectitle:
    element: title
    role: section-title
  booktitle:
    element: title
    role: book-title
  subtitle:
    element: subtitle
  heading:
    element: bridgehead

  # --- PARAGRAPH PATTERNS ---
  para:
    element: para
  paragraph:
    element: para
  bodytext:
    element: para
  body-text:
    element: para
  text:
    element: para
  content:
    element: para
  normal:
    element: para

  # --- LIST PATTERNS ---
  list:
    element: itemizedlist
  bulletlist:
    element: itemizedlist
  bullet-list:
    element: itemizedlist
  unordered-list:
    element: itemizedlist
  numberedlist:
    element: orderedlist
  numbered-list:
    element: orderedlist
  ordered-list:
    element: orderedlist
  definitionlist:
    element: variablelist
  definition-list:
    element: variablelist
  glosslist:
    element: glosslist

  # --- FIGURE PATTERNS ---
  figure:
    element: figure
  fig:
    element: figure
  image:
    element: figure
  illustration:
    element: figure
  photo:
    element: figure
  photograph:
    element: figure
  figurecaption:
    element: title
    context: figure
  figcaption:
    element: title
    context: figure
  caption:
    element: title
    context: figure
  figuretitle:
    element: title
    context: figure
  figurelabel:
    element: title
    context: figure
  figlabel:
    element: title
    context: figure

  # --- TABLE PATTERNS ---
  table:
    element: table
  tablecaption:
    element: title
    context: table
  table-caption:
    element: title
    context: table
  tabletitle:
    element: title
    context: table
  table-title:
    element: title
    context: table
  tablelabel:
    element: title
    context: table

  # --- FOOTNOTE PATTERNS ---
  footnote:
    element: footnote
  fn:
    element: footnote
  endnote:
    element: footnote
    role: endnote
  note:
    element: note

  # --- BIBLIOGRAPHY PATTERNS ---
  bibliography:
    element: bibliography
  references:
    element: bibliography
  works-cited:
    element: bibliography
  workscited:
    element: bibliography
  reference-list:
    element: bibliography
  referencelist:
    element: bibliography
  citation:
    element: bibliomixed
  biblioentry:
    element: bibliomixed
  bibliographyentry:
