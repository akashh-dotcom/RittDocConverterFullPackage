# ============================================================================
# EPUB:TYPE TO DOCBOOK ELEMENT MAPPINGS
# ============================================================================
# Maps epub:type attribute values to DocBook elements.
# See https://www.w3.org/TR/epub-ssv-11/ for standard values.

epub_type_mappings:
  # Document divisions
  bodymatter: chapter
  frontmatter: preface
  backmatter: appendix
  part: part
  chapter: chapter
  division: part
  volume: part
  subchapter: sect1

  # Sections
  abstract: abstract
  foreword: preface
  preface: preface
  prologue: preface
  introduction: preface
  preamble: preface
  epigraph: epigraph
  dedication: dedication
  acknowledgments: preface
  afterword: appendix
  epilogue: appendix
  conclusion: appendix
  colophon: colophon
  appendix: appendix

  # Titles
  title: title
  subtitle: subtitle
  halftitle: titlepage
  fulltitle: title
  covertitle: title

  # Navigation
  toc: toc
  landmarks: toc
  lot: lot
  loi: lot
  loa: lot
  lov: lot

  # Reference sections
  bibliography: bibliography
  doc-bibliography: bibliography
  glossary: glossary
  doc-glossary: glossary
  index: index
  doc-index: index

  # Notes
  footnote: footnote
  doc-footnote: footnote
  endnote: footnote
  doc-endnote: footnote
  footnotes: bibliodiv
  endnotes: bibliodiv
  rearnote: footnote
  rearnotes: bibliodiv

  # Bibliographic entries
  biblioentry: bibliomixed
  doc-biblioentry: bibliomixed
  biblioref: xref

  # Content elements
  sidebar: sidebar
  doc-sidebar: sidebar
  tip: tip
  warning: warning
  caution: caution
  important: important
  note: note
  doc-notice: note
  example: example

  # Media
  figure: figure
  table: table
  img: mediaobject

  # Navigation within documents
  pagebreak: anchor
  doc-pagebreak: anchor
  page-list: toc
  pagelist: toc

  # Quotes
  blockquote: blockquote
  epigraph: epigraph
  pullquote: blockquote

  # Index terms
  indexterm: indexterm
  doc-indexterm: indexterm

  # Credits
  contributors: authorgroup
  credits: authorgroup
  imprint: legalnotice
  copyright-page: legalnotice

  # Learning content
  qna: qandaset
  question: question
  answer: answer
  learning-assessment: qandaset
  learning-objective: itemizedlist
  learning-objectives: itemizedlist
  learning-outcome: itemizedlist
  learning-outcomes: itemizedlist
  learning-resource: itemizedlist
  learning-resources: itemizedlist
  learning-standard: para
  learning-standards: itemizedlist

# ============================================================================
# ID PREFIX PATTERNS
# ============================================================================
# Patterns for generating element IDs based on element type.

id_patterns:
  figure: "fg"
  table: "ta"
  footnote: "fn"
  bibliography: "bib"
  equation: "eq"
  example: "ex"
  sidebar: "sb"
  note: "nt"
  section: "s"
  chapter: "ch"
  para: "p"
  anchor: "a"

# ============================================================================
# CONTENT NORMALIZATION RULES
# ============================================================================
# Rules for normalizing content during conversion.

normalization:
  # Collapse multiple whitespace to single space
  collapse_whitespace: true

  # Remove soft hyphens (U+00AD)
  remove_soft_hyphens: true

  # Normalize quotes to standard ASCII
  normalize_quotes: true

  # Remove zero-width characters
  remove_zero_width: true

  # Strip leading/trailing whitespace from elements
  strip_element_whitespace: true

# ============================================================================
# ELEMENT SKIP LIST
# ============================================================================
# Elements/classes to skip during conversion (not converted to DocBook).

skip_elements:
  - pagebreak
  - page-break
  - citationnumber
  - citation-number
  - linenumber
  - line-number
  - runnninghead
  - running-head
  - runningfoot
  - running-foot
  - header
  - footer
  - nav
  - navigation
  - breadcrumb
  - breadcrumbs
  - toolbar
  - pagination

# ============================================================================
# POST-PROCESSING RULES
# ============================================================================
# Rules applied during post-processing phase after XML generation.
# Publisher-specific configs can override these with their own rules.
#
# Available rule types:
#
# 1. remove_chapters: Remove entire chapter files matching patterns
#    - pattern: Text to match in chapter title (case-insensitive by default)
#    - case_sensitive: false (default) or true
#    - match_type: "contains" (default), "exact", "startswith", "endswith", "regex"
#
# 2. remove_elements: Remove elements matching XPath patterns
#    - xpath: XPath expression to match elements
#    - reason: Description of why this is removed
#
# 3. transform_content: Transform content matching patterns
#    - pattern: Regex pattern to match
#    - replacement: Replacement string (supports \1, \2 backreferences)
#    - elements: List of element types to apply to (empty = all)

post_processing:
  # Default: no chapters to remove
  remove_chapters: []

  # Default: no elements to remove
  remove_elements: []

  # Default: no content transforms
  transform_content: []
