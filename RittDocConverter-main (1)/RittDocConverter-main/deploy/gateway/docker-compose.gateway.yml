# RittDoc API Gateway - Docker Compose
# =====================================
# This file adds an API Gateway to your deployment.
# Use with: docker-compose -f docker-compose.yml -f deploy/gateway/docker-compose.gateway.yml up

version: '3.8'

services:
  # ==========================================================================
  # Traefik API Gateway
  # ==========================================================================
  gateway:
    image: traefik:v3.0
    container_name: rittdoc-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard (disable in production)
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=rittdoc-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Uncomment for Let's Encrypt:
      # - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      # - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # - "--certificatesresolvers.letsencrypt.acme.email=admin@example.com"
      # - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - gateway-certs:/letsencrypt
    networks:
      - rittdoc-network
    labels:
      # Dashboard
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard.service=api@internal"

  # ==========================================================================
  # EPUB Service (with gateway labels)
  # ==========================================================================
  epub-service:
    labels:
      - "traefik.enable=true"
      # Main router
      - "traefik.http.routers.epub.rule=PathPrefix(`/epub`)"
      - "traefik.http.routers.epub.entrypoints=web,websecure"
      - "traefik.http.services.epub.loadbalancer.server.port=5001"
      # Strip prefix middleware
      - "traefik.http.middlewares.epub-strip.stripprefix.prefixes=/epub"
      - "traefik.http.routers.epub.middlewares=epub-strip@docker"
      # Health check
      - "traefik.http.services.epub.loadbalancer.healthcheck.path=/api/v1/health"
      - "traefik.http.services.epub.loadbalancer.healthcheck.interval=10s"

  # ==========================================================================
  # Editor Service (with gateway labels)
  # ==========================================================================
  editor:
    labels:
      - "traefik.enable=true"
      # Editor router
      - "traefik.http.routers.editor.rule=PathPrefix(`/editor`)"
      - "traefik.http.routers.editor.entrypoints=web,websecure"
      - "traefik.http.services.editor.loadbalancer.server.port=5000"
      # Strip prefix middleware
      - "traefik.http.middlewares.editor-strip.stripprefix.prefixes=/editor"
      - "traefik.http.routers.editor.middlewares=editor-strip@docker"
      # Health check
      - "traefik.http.services.editor.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.editor.loadbalancer.healthcheck.interval=10s"

  # ==========================================================================
  # UI Service (with gateway labels)
  # ==========================================================================
  ui:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui.rule=PathPrefix(`/`)"
      - "traefik.http.routers.ui.entrypoints=web,websecure"
      - "traefik.http.routers.ui.priority=1"  # Lowest priority (catch-all)
      - "traefik.http.services.ui.loadbalancer.server.port=3000"

volumes:
  gateway-certs:
    name: rittdoc-gateway-certs

networks:
  rittdoc-network:
    external: true
