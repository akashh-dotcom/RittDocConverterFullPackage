# RittDoc API Gateway - Nginx Configuration
# ==========================================
# This configuration routes all API requests through a single entry point.
# The UI only needs to know the gateway URL, not individual service URLs.
#
# Usage:
#   1. Copy this to your nginx configuration
#   2. Update upstream servers to match your deployment
#   3. Update SSL certificates for production
#   4. Reload nginx: nginx -s reload

# =============================================================================
# Upstream Definitions
# =============================================================================
# Define backend services. These can be:
# - Docker containers on the same network
# - Kubernetes services
# - External URLs

upstream epub_service {
    # Local development / Docker Compose
    server epub-service:5001;

    # For load balancing, add multiple servers:
    # server epub-service-1:5001 weight=5;
    # server epub-service-2:5001 weight=5;

    # Health checks (nginx plus only)
    # health_check interval=10s fails=3 passes=2;
}

upstream ui_service {
    server ui:3000;
}

# =============================================================================
# Rate Limiting
# =============================================================================
# Protect against abuse

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=1r/s;

# =============================================================================
# Main Server Block
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name api.rittdoc.example.com;

    # Redirect HTTP to HTTPS in production
    # return 301 https://$server_name$request_uri;

    # For development, handle directly
    include /etc/nginx/conf.d/api-gateway.conf;
}

# HTTPS Server (Production)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.rittdoc.example.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    include /etc/nginx/conf.d/api-gateway.conf;
}

# =============================================================================
# API Gateway Routes (included file)
# =============================================================================
# Save this as /etc/nginx/conf.d/api-gateway.conf

# --- START api-gateway.conf ---

# CORS Headers (applied to all responses)
add_header 'Access-Control-Allow-Origin' '$http_origin' always;
add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-API-Key' always;
add_header 'Access-Control-Allow-Credentials' 'true' always;

# Handle preflight requests
if ($request_method = 'OPTIONS') {
    add_header 'Access-Control-Allow-Origin' '$http_origin';
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-API-Key';
    add_header 'Access-Control-Max-Age' 86400;
    add_header 'Content-Length' 0;
    add_header 'Content-Type' 'text/plain';
    return 204;
}

# -----------------------------------------------------------------------------
# Service Discovery Endpoint
# -----------------------------------------------------------------------------
# Returns available services and their health status

location = /api/v1/services {
    default_type application/json;
    return 200 '{
        "services": {
            "epub": {
                "name": "EPUB Processing Service",
                "base_url": "/epub",
                "health": "/epub/api/v1/health",
                "docs": "/epub/api/v1/info"
            }
        },
        "gateway_version": "1.0.0"
    }';
}

# -----------------------------------------------------------------------------
# EPUB Service Routes
# -----------------------------------------------------------------------------

location /epub/ {
    # Rate limiting
    limit_req zone=api_limit burst=20 nodelay;

    # Rewrite to remove /epub prefix
    rewrite ^/epub/(.*) /$1 break;

    # Proxy to EPUB service
    proxy_pass http://epub_service;
    proxy_http_version 1.1;

    # Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts for long-running conversions
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Buffering for large responses
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 32k;
}

# EPUB file uploads (higher limits, stricter rate limit)
location /epub/api/v1/convert {
    limit_req zone=upload_limit burst=5 nodelay;

    rewrite ^/epub/(.*) /$1 break;

    proxy_pass http://epub_service;
    proxy_http_version 1.1;

    # Allow large file uploads
    client_max_body_size 500M;

    # Longer timeouts for uploads
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# -----------------------------------------------------------------------------
# Health Check Endpoints
# -----------------------------------------------------------------------------

location = /health {
    access_log off;
    default_type application/json;
    return 200 '{"status": "healthy", "service": "api-gateway"}';
}

# Aggregate health check (checks all services)
location = /health/all {
    access_log off;
    default_type application/json;

    # In production, use a script to check all services
    # For now, return gateway status
    return 200 '{"gateway": "healthy", "note": "Use /epub/api/v1/health for service status"}';
}

# -----------------------------------------------------------------------------
# Error Handling
# -----------------------------------------------------------------------------

error_page 502 503 504 /50x.json;
location = /50x.json {
    default_type application/json;
    return 503 '{"error": "Service temporarily unavailable", "code": 503}';
}

# --- END api-gateway.conf ---
