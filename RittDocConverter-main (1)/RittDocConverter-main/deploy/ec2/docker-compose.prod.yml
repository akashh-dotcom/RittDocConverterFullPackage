version: '3.8'

# =============================================================================
# RittDocConverter Production Docker Compose
# =============================================================================
# Usage: docker compose -f docker-compose.prod.yml --env-file /path/to/.env up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # EPUB Processing Service
  # ---------------------------------------------------------------------------
  epub-service:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: rittdoc-epub
    restart: unless-stopped
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-RittenhouseXMLConverter}
      - API_HOST=0.0.0.0
      - API_PORT=5001
      - API_DEBUG=false
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-4}
      - JOB_TIMEOUT_SECONDS=${JOB_TIMEOUT_SECONDS:-3600}
    ports:
      - "${EPUB_API_PORT:-5001}:5001"
    volumes:
      - epub-data:/app/Output
      - epub-logs:/app/logs
      - /tmp/rittdoc:/tmp/rittdoc
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Editor Service
  # ---------------------------------------------------------------------------
  editor:
    build:
      context: ../../editor
      dockerfile: Dockerfile
    container_name: rittdoc-editor
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - HOST=0.0.0.0
      - PORT=5000
    ports:
      - "${EDITOR_PORT:-5000}:5000"
    volumes:
      - editor-data:/app/editor/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (optional - for SSL termination)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: rittdoc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - epub-service
      - editor
    profiles:
      - with-proxy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  epub-data:
    driver: local
  epub-logs:
    driver: local
  editor-data:
    driver: local
  nginx-logs:
    driver: local

networks:
  default:
    name: rittdoc-network
    driver: bridge
