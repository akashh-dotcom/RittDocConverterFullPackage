# CI Workflow - Tests and Linting
# ================================
# Runs on every push and pull request

name: CI

on:
  push:
    branches: [main, develop, 'feature/*', 'claude/*']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ==========================================================================
  # Lint and Type Check
  # ==========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy black isort
          pip install -r requirements.txt

      - name: Check code formatting (black)
        run: black --check --diff .
        continue-on-error: true

      - name: Check import sorting (isort)
        run: isort --check-only --diff .
        continue-on-error: true

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings as errors would be too strict for now
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Type check with mypy
        run: mypy --ignore-missing-imports --no-error-summary api/ src/ || true
        continue-on-error: true

  # ==========================================================================
  # Unit Tests
  # ==========================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DATABASE: rittdoc_test
        run: |
          pytest tests/ -v --cov=src --cov=api --cov-report=xml --cov-report=term-missing || true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ==========================================================================
  # Build Test (Docker)
  # ==========================================================================
  build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: rittdoc/epub-service:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Editor Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./editor
          file: ./editor/Dockerfile
          push: false
          tags: rittdoc/editor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

  # ==========================================================================
  # Integration Tests
  # ==========================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Start services
        run: |
          docker compose up -d --build
          # Wait for services to be healthy
          sleep 30

      - name: Check service health
        run: |
          curl -f http://localhost:5001/api/v1/health || exit 1

      - name: Run API smoke tests
        run: |
          # Test endpoints
          curl -f http://localhost:5001/api/v1/info || exit 1
          curl -f http://localhost:5001/api/v1/service-info || exit 1
          curl -f http://localhost:5001/api/v1/config/schema || exit 1

      - name: Stop services
        if: always()
        run: |
          docker compose down -v
