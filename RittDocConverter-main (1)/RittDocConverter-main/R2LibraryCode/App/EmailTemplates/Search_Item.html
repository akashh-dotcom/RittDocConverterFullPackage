<tr>
    <td class="details" style="width:100px">
        <div class="title-image">
            <a href="{Resource_Url}" target="_blank"><img alt="{Resource_Title}" src="{Resource_ImageUrl}" width="54" /></a>
        </div>
    </td>
    <td class="details">
        <div class="title-item">
            <div class="title-description">
                <h2><a href="{Resource_Url}" style="color:#072F62; text-decoration:none;" target="_blank">{Resource_Title}</a></h2>
                <p class="title-authors">{Resource_Authors}</p>
                <p class="title-blurb">{Resource_Gist}</p>
            </div>
        </div>
    </td>
</tr>
