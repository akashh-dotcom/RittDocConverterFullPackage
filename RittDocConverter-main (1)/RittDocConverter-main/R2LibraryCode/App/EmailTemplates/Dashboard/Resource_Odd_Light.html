<table border="0" cellpadding="0" cellspacing="0" width="600" style="padding: 10px 20px;">
	<tr>
		<td valign="top" style="border-collapse: collapse;">
			<table border="0" cellpadding="0" cellspacing="0" width="100%">
				<tr>
					<td align="left" valign="top" width="96" style="border-collapse: collapse;">
						<img src="{Resource_Image_URL}" alt="" border="0" width="96" height"122" style="margin: 0;padding: 0; border: 0;height: auto;line-height: 100%;outline: none;text-decoration: none;">
					</td>
					<td width="20" style="border-collapse: collapse;">
						<br>
					</td>
					<td style="word-break: break-all; -webkit-hyphens: auto; -moz-hyphens: auto; hyphens: auto; border-collapse: collapse !important; vertical-align: top; text-align: left; color: #222222; font-family: 'Helvetica', 'Arial', sans-serif; font-weight: normal; line-height: 19px; font-size: 14px; margin: 0; padding: 0;" align="left" valign="top">					
						<table>
							<tr>
								<td colspan="2">
									<h4 style="color: #585858; font-family: 'Helvetica', 'Arial', sans-serif; font-weight: normal; text-align: left; line-height: 1.3; word-break: normal; font-size: 14px; margin: 0; padding: 0;" align="left"><a href="{Resource_URL}" style="color: #7c000c !important; text-decoration: underline;">{Resource_Title}, <span style="font-weight: bold;">{Resource_Edition} Edition</span></a></h4>
								</td>
							</tr>
							<tr>
								<td style="width:60%">
									<p style="color: #585858; font-family: 'Helvetica', 'Arial', sans-serif; font-weight: normal; text-align: left; line-height: 19px; font-size: 12px; margin: 0; padding: 0;" align="left"><span style="font-weight: bold;">{Resource_Author}</span></p>
							
									<p style="color: #585858; font-family: 'Helvetica', 'Arial', sans-serif; font-weight: normal; text-align: left; line-height: 19px; font-size: 12px; margin: 0; padding: 0;" align="left">ISBN: <span style="font-weight: bold;">{Resource_ISBN}</span></p>
									
									<p style="color: #585858; font-family: 'Helvetica', 'Arial', sans-serif; font-weight: normal; text-align: left; line-height: 19px; font-size: 12px; margin: 0; padding: 0;" align="left">Publisher: <span style="font-weight: bold;">{Resource_Publisher}</span></p>
									
									<p style="color: #585858; font-family: 'Helvetica', 'Arial', sans-serif; font-weight: normal; text-align: left; line-height: 19px; font-size: 12px; margin: 0; padding: 0;" align="left">Publication Date: <span style="font-weight: bold;">{Resource_Publication_Date}</span></p>
								</td>
								<td style="vertical-align: bottom; text-align: right; width:40%">
									{Resource_PriceList}
								</td>
							</tr>
						</table>
					</td>
				</tr>
			</table>
		</td>
	</tr>
</table>
